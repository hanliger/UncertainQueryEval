definition: 대화 내에서 제공된 정보, 조건, 또는 전제들이 서로 충돌하지 않고 양립 가능한 정도. 발화 내 자기모순, 이전 턴과의 사실 불일치, 시스템 상태와의 충돌을 평가한다.
sub_dimension:
  Intra-utterance Consistency:
  - 마지막 사용자 쿼리에서 제시된 조건들이 서로 논리적으로 양립 가능한가?
  - 상호 배타적인 상태나 조건(종료된 것의 진행, 불가능한 것의 실행 등)이 동시에 요구되고 있지 않은가?
  - 직전 턴에서 인지한 제약(한도, 불가 상태 등)을 무시하는 요청이 아닌가?
  - 마지막 사용자 쿼리에서 제시된 정보가 서로 모순되지 않는가?
  - 사용자가 요청한 조건들이 서로 충돌하지 않고 일관성을 유지하는가?
  Cross-turn Premise Compatibility:
  - 이전 턴에서 확인·합의된 사실(이체 완료, 계산 기준 기간 등)과 마지막 쿼리의 전제가 일치하는가?
  - 시스템이 '완료됨', '종료됨', '존재하지 않음' 등으로 안내한 상태를 마지막 쿼리가 부정하고 있지 않은가?
  - 사용자가 이전에 수용한 사실(기간, 금액, 상품 등)을 마지막 쿼리에서 다른 값으로 잘못 인용하고 있지 않은가?
  - 이전 대화에서 설정된 조건이나 제한이 마지막 쿼리에서 유지되고 있는가?
  - 마지막 쿼리가 이전 대화에서 확인된 정보와 일치하는가?
  System State Compatibility:
  - 사용자의 요청이 시스템 데이터의 현재 상태와 충돌하지 않는가?
  - 비활성 상태의 대상에 대해 활성 전제의 작업을 요청하거나, 미보유 서비스의 기능을 요청하는 등 데이터 현실과 배치되지 않는가?
  - 시스템 규칙상 논리적으로 성립하지 않는 작업(동일 출발지와 도착지, 제약 초과 등)을 요청하고 있지 않은가?
  - 사용자의 요청이 시스템의 현재 기능 범위 내에 있는가?
  - 시스템의 현재 상태와 일치하는 요청을 사용자가 하고 있는가?
