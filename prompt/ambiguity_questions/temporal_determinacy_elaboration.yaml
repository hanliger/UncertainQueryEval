definition: 대화 내에서 참조 대상이나 조건의 값이 시간 또는 외부 요인에 의해 변동하지 않고 안정적으로 확정되는 정도. 실시간 데이터 의존성, 시점 간 값 불일치, 과거 스냅샷 부재 등을 평가한다.
sub_dimension:
  Temporal Stability:
  - 마지막 쿼리에서 참조하는 값(환율, 잔액, 한도 등)이 조회 시점과 무관하게 고정된 값인가?
  - '''지금'', ''현재'', ''요즘'' 등 시점 의존 표현이 가리키는 값이 실행 시점에도 동일하게 유지되는가?'
  - 실시간으로 변동하는 데이터(환율, 잔여 한도, 누적 이자 등)에 기반한 계산 요청이 아닌가?
  - 마지막 쿼리에서 참조하는 환율이 특정 날짜나 시간에 고정된 값인가?
  - 잔액이 특정 시점의 스냅샷으로 제공되어 시점에 따라 변하지 않는가?
  - 한도가 특정한 날짜에 설정된 값으로, 이후 변동이 없는가?
  - '''지금''이라는 표현이 특정한 날짜와 시간을 명시하여 참조하는가?'
  - 실시간 데이터가 아닌, 특정 시점의 스냅샷 데이터를 기반으로 계산이 이루어지는가?
  Reference Anchoring:
  - 마지막 쿼리의 지시 대상이 외부 상태 변화와 무관하게 하나의 고정된 값을 가리키는가?
  - 대화 진행 중에도 외부 이벤트에 의해 계속 변하는 값(잔여 한도, 누적 금액, 누적 이자 등)을 참조하고 있지 않은가?
  - 이전 턴의 계산 결과나 조회 결과가 현재 시점에서도 유효한 값인가?
  - 마지막 쿼리의 지시 대상이 특정한 날짜나 시간에 고정된 값으로 명시되어 있는가?
  - 외부 이벤트에 의해 변동되지 않는 특정한 날짜의 잔여 한도를 참조하고 있는가?
  - 이전 턴의 계산 결과가 특정 시점의 데이터로, 이후 변동이 없는가?
  Historical Data Determinacy:
  - 과거 특정 시점의 값(첫 이체 전 잔액, 개설 당시 잔액 등)을 요청하는데 해당 시점 데이터가 존재하는가?
  - '''요즘 금리'', ''최근 환율'' 같은 모호한 시간 범위가 아닌 확정된 기준 시점이 명시되어 있는가?'
  - 과거 특정 시점의 첫 이체 전 잔액이 명확히 기록되어 있는가?
  - 개설 당시 잔액이 특정 날짜로 명시되어 있는가?
  - '''최근 환율'' 대신 특정 날짜의 환율이 명시되어 있는가?'
  - 과거 특정 시점의 금리가 명확히 기록되어 있는가?
