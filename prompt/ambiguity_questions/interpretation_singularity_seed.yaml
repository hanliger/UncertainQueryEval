definition: 마지막 사용자 쿼리의 해석이 하나로 수렴되는 정도. 지시 대상, 구문 구조, 참조 표현, 또는 열거 항목 간 대응 관계가 복수의 해석 경로를 만들지 않는지를 평가한다. 평가 시 가장 자연스러운 해석
  하나를 선택하지 말고, 합리적으로 가능한 모든 대안 해석을 먼저 열거한 뒤 판단할 것.
sub_dimension:
  Target Singularity:
  - 마지막 쿼리에서 지칭하는 대상(사람, 상품, 계좌 등)에 대해 서로 다른 두 가지 이상의 합리적 후보가 존재하지 않는가?
  - 별명이나 지시 표현에 매핑될 수 있는 개체가 대화 이력이나 시스템 데이터에서 정확히 하나뿐인가?
  - 동일 호칭으로 불릴 수 있는 서로 다른 개체가 대화에 등장한 적이 없는가?
  Structural Univocality:
  - 마지막 쿼리의 구문을 서로 다른 두 가지 이상의 방식으로 파싱(해석)할 수 있는 가능성이 없는가?
  - 수식어의 피수식어가 둘 이상 될 수 있거나, 접속 구조의 범위가 달라질 수 있는 구문적 중의성이 없는가?
  Correspondence Determinacy:
  - 나열된 대상과 나열된 값(금액, 조건 등)의 대응 순서를 바꿔도 문법적으로 성립하지 않는가?
  - 복수 대상과 복수 값이 나열된 구문에서 대응 관계를 뒤집은 해석이 합리적으로 가능하지 않은가?
  - 접속 구조에서 각 항목을 독립 수행하는 해석과 조합 수행하는 해석이 모두 가능하지 않은가?
  Anaphoric Resolution:
  - 대명사나 지시 표현의 선행사 후보가 대화 이력에서 정확히 하나뿐이어서 다른 대상을 가리킬 가능성이 없는가?
  - 직전 대화에서 복수의 대상이 동등하게 비교된 직후 지시 표현이 사용된 경우, 다른 쪽을 가리키는 해석이 성립하지 않는가?
  Search Term Uniqueness:
  - 사용자가 사용한 검색어로 시스템을 조회했을 때 반환되는 결과가 정확히 하나뿐인가?
  - 상위 분류명이나 약칭 사용으로 인해 복수의 서로 다른 엔티티가 매칭될 가능성이 없는가?
