definition: 사용자의 요청이 시스템의 지식 베이스(서비스 사양, 상품 정보, 사용자 데이터) 내에서 충돌 없이 처리 가능한 정도. 데이터 존재 여부, 상태 유효성, 검색 결과의 단일성, 시점 데이터 가용성을 평가한다.
sub_dimension:
  Record Existence:
  - 요청 처리에 필요한 데이터(수신자 정보, 상품 정보, 계좌 정보 등)가 시스템에 실제로 존재하는가?
  - 사용자가 언급한 수신자가 이체 이력 데이터베이스에 등록되어 있는가?
  - 요청된 계산에 필요한 핵심 데이터(금리, 수수료율, 금액 설정값 등)가 시스템에 적재되어 있는가?
  - 사용자가 언급한 수신자가 이체 이력 데이터베이스에 등록되어 있으며, 최근 6개월 내에 거래 기록이 있는가?
  - 요청된 계산에 필요한 금리 정보가 최신 상태로 시스템에 적재되어 있는가?
  - 사용자가 요청한 상품 정보가 시스템의 최신 데이터베이스에 존재하는가?
  Status Validity:
  - 사용자가 요청한 대상(상품, 계좌, 서비스)의 현재 상태가 요청을 수행할 수 있는 유효한 상태인가?
  - 판매 종료, 계약 해지, 서비스 미가입 등 비활성 상태의 대상에 대해 활성 전제의 작업을 요청하고 있지 않은가?
  - 사용자 본인의 서비스 이용 요건(계좌 보유, 상품 가입 등)이 실제로 충족되어 있는가?
  - 사용자가 요청한 계좌가 현재 활성 상태이며, 거래 제한이 없는가?
  - 사용자가 요청한 서비스가 현재 사용 가능한 상태로 시스템에 등록되어 있는가?
  - 사용자가 요청한 상품이 현재 판매 중이며, 구매 가능한 상태인가?
  Unique Resolution:
  - 사용자의 검색어나 지칭이 시스템에서 단일 결과로 해소되는가?
  - 동일 별명에 복수 수신자가 매핑되거나, 동일 상품명에 복수 버전이 존재하여 어느 레코드인지 특정 불가한 상황이 아닌가?
  - 상위 분류명으로 검색 시 다수 결과가 반환되어 단일 대상을 특정할 수 없는 상황이 아닌가?
  - 사용자가 언급한 수신자 이름이 시스템 내에서 단일 수신자로 매핑되는가?
  - 사용자가 검색한 상품명이 시스템 내에서 단일 버전으로 식별 가능한가?
  - 사용자가 제공한 계좌 번호가 시스템 내에서 단일 계좌로 식별되는가?
  Logical Feasibility:
  - 요청이 시스템의 비즈니스 규칙과 논리적으로 양립 가능한가?
  - 시스템 비즈니스 규칙상 무의미하거나 실행 불가능한 작업이 아닌가?
  - 사용자가 요청한 작업이 시스템의 현재 비즈니스 규칙에 따라 실행 가능한가?
  - 사용자가 요청한 서비스 변경이 시스템의 정책에 따라 허용되는가?
  Temporal Data Availability:
  - 사용자가 요청한 시점의 데이터가 시스템에 존재하는가?
  - 과거 특정 시점의 스냅샷 데이터를 요구하는데 시스템이 현재 시점 데이터만 보유하고 있지 않은가?
  - 사용자가 요청한 특정 과거 시점의 데이터가 시스템에 백업되어 있는가?
  - 사용자가 요청한 데이터가 시스템의 데이터 보존 정책에 따라 보관되어 있는가?
