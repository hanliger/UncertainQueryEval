definition: 사용자의 요청이 단일 작업으로 실행할 수 있을 만큼 구체적인 정도. 추상적 동사, 상위 분류명, 포괄적 범위 지정, 주관적 기준 등으로 인해 실행 대상이 좁혀지지 않는 경우를 평가한다.
sub_dimension:
  Action Specificity:
  - 마지막 쿼리에서 사용된 동사가 구체적인 단일 행위를 지칭하는가?
  - 요청된 행위가 시스템의 특정 API나 기능 하나에 대응 가능한 수준인가?
  - 요청된 작업이 구체적인 단계나 절차를 포함하고 있는가?
  - 사용자가 원하는 결과가 명확하게 정의되어 있는가?
  - 마지막 쿼리에서 사용된 동사가 '계산하다', '전송하다', '다운로드하다' 등과 같이 구체적인 단일 작업을 명확히 지칭하는가?
  - 요청된 행위가 '보고서 생성', '계좌 이체', '데이터 백업' 등과 같이 시스템의 특정 기능 하나에 직접적으로 대응하는가?
  - 사용자가 요청한 작업이 '파일 저장', '계정 업데이트' 등과 같이 명확히 정의된 작업으로 해석될 수 있는가?
  Scope Boundedness:
  - 요청의 범위가 하나의 작업으로 처리 가능한 수준으로 한정되어 있는가?
  - '''다'', ''전부'', ''관련된 거 모두'', ''쭉'' 등 포괄적 범위 지정 없이 처리 대상이 특정되어 있는가?'
  - 상위 분류명('대출', '지출 내역', '최근 이체') 대신 구체적인 하위 항목(상품명, 기간, 카테고리 등)이 명시되어 있는가?
  - 요청의 범위가 특정 시간이나 장소로 제한되어 있는가?
  - 처리 대상이 명확하게 식별 가능한 항목으로 나열되어 있는가?
  - 요청의 범위가 '지난 달', '특정 계좌', '지정된 카테고리' 등과 같이 명확히 한정되어 있는가?
  - 처리 대상이 '모든 거래 내역' 대신 '지난 주의 거래 내역' 등과 같이 구체적으로 특정되어 있는가?
  - 요청의 범위가 '모든 대출' 대신 '주택 대출' 등과 같이 구체적인 하위 항목으로 명시되어 있는가?
  Criterion Objectivity:
  - '''제일 유리한 걸로'', ''좋은 쪽으로'' 등 주관적·다기준 판단을 요구하는 표현 없이 객관적 실행 기준이 명시되어 있는가?'
  - 비교나 선택을 요청할 경우 판단 기준(금리, 기간, 수수료 등)이 하나로 특정되어 있는가?
  - 요청된 작업의 결과를 평가할 수 있는 명확한 기준이 제공되어 있는가?
  - 결정이나 선택을 위한 기준이 구체적이고 측정 가능한 요소로 구성되어 있는가?
  - 비교나 선택을 요청할 경우 '가장 낮은 금리', '가장 긴 기간' 등과 같이 명확한 단일 기준이 제시되어 있는가?
  - 사용자가 요청한 기준이 '최소 수수료', '최대 이익' 등과 같이 객관적으로 측정 가능한가?
  - 결정 기준이 '가장 빠른 처리 시간' 등과 같이 명확하고 측정 가능한 단일 기준으로 제시되어 있는가?
