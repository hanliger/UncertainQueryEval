definition: 마지막 사용자 발화 자체가 언어적으로 완결되고 명확한 정도. 서술어 존재, 문법적 완결성, 중의적 표현, 논리적 자기모순, 시점 의존 표현 등 발화 수준의 모호성을 평가한다.
sub_dimension:
  Predicate Explicitness:
  - 마지막 발화에 원하는 행위를 나타내는 서술어(동사)가 명시적으로 포함되어 있는가?
  - 수신자, 금액, 옵션 등 조건만 나열되고 서술어가 빠진 형태가 아닌가?
  - 마지막 발화에 포함된 서술어가 명확하게 특정 행위를 지시하는가?
  - 발화의 서술어가 수신자나 금액과 같은 조건과 일관되게 연결되어 있는가?
  - 마지막 발화에 포함된 서술어가 특정한 금융 거래를 명확히 지시하고 있는가?
  - 발화에서 요구하는 행위가 명확히 정의되어 있어, 수신자가 혼동 없이 이해할 수 있는가?
  - 서술어가 발화의 다른 요소들과 일관되게 연결되어 있는가?
  Syntactic Completeness:
  - 마지막 발화가 문법적으로 완결된 문장 형태를 갖추고 있는가?
  - 주어, 서술어, 목적어 등 핵심 문장 성분이 생략 없이 포함되어 있는가?
  - 마지막 발화가 문법적으로 완전한 문장 구조를 유지하고 있는가?
  - 문장 내 모든 필수 성분이 적절한 순서로 배열되어 있는가?
  - 문장 내에 필요한 전치사나 접속사가 빠지지 않고 포함되어 있는가?
  - 문장 구조가 복잡하지 않고 명확하게 이해될 수 있는가?
  Semantic Univocality:
  - 마지막 발화의 어휘와 표현이 단일한 의미로만 해석되는가?
  - '''처리해줘'', ''정리해줘'', ''관리해줘'' 같은 추상적 동사 없이 구체적 행위가 지정되어 있는가?'
  - 발화만 단독으로 읽었을 때 의도가 명확히 파악되는가?
  - 발화의 의미가 다의적이지 않고 명확하게 전달되는가?
  - 발화에 사용된 용어가 특정한 맥락 없이도 명확한 의미를 가지는가?
  - 발화에 사용된 모든 명사가 단일한 의미로 해석될 수 있는가?
  - 발화의 의미가 문맥에 의존하지 않고 독립적으로 명확한가?
  Propositional Consistency:
  - 마지막 발화 내에서 제시된 조건이나 전제가 서로 논리적으로 양립 가능한가?
  - 이미 해소된 전제와 현재 요청이 동시에 성립할 수 없는 조건을 포함하고 있지 않은가?
  - 하나의 발화 안에서 상호 배타적인 결과를 동시에 요구하는 논리적 자기모순이 포함되어 있지 않은가?
  - 발화 내의 모든 조건이 서로 충돌 없이 조화롭게 구성되어 있는가?
  - 발화가 논리적으로 일관된 요청을 포함하고 있는가?
  - 발화 내의 모든 조건이 서로 충돌하지 않고 일관성을 유지하는가?
  - 발화에서 제시된 모든 전제가 동일한 상황을 가정하고 있는가?
  - 발화 내의 모든 요구 사항이 동시에 충족될 수 있는가?
  Temporal Independence:
  - 마지막 발화에서 참조하는 값이 '지금', '현재', '요즘', '오늘 남은' 등 시점 의존 표현에 고착되어 있지 않은가?
  - 발화의 의미가 발화 시점과 실행 시점 사이의 시간 경과에 의해 달라지지 않는가?
  - 발화의 의미가 특정 시점에 의존하지 않고 지속적으로 유지되는가?
  - 발화가 시간에 따라 변하지 않는 명확한 지시를 포함하고 있는가?
  - 발화에서 사용된 시간 표현이 특정 시점에 고정되지 않고 일반적으로 적용 가능한가?
  - 발화의 의미가 시간의 흐름에 따라 변하지 않고 일관성을 유지하는가?
  - 발화가 특정 날짜나 시간에 의존하지 않고도 이해될 수 있는가?
