definition: 대화에서 요청을 수행하기 위해 필요한 핵심 정보가 빠짐없이 제공되어 있는 정도. 서술어, 파라미터, 참조 대상의 결핍 여부를 평가한다.
sub_dimension:
  Predicate Presence:
  - 마지막 사용자 쿼리에 원하는 행위를 나타내는 서술어(동사)가 명시되어 있는가?
  - 서술어가 생략되었더라도 대화 문맥에서 의도된 행위를 유일하게 복원할 수 있는가?
  - '''좀 해줘요'' 같은 행위 미지정 표현이 아니라 구체적인 동작이 식별 가능한가?'
  - 마지막 사용자 쿼리에서 수행할 작업의 목적이 명확하게 드러나는가?
  - 대화의 흐름에서 서술어가 암시적으로라도 이해될 수 있는가?
  Parameter Completeness:
  - 요청 수행에 필요한 필수 파라미터(대상, 금액, 기간, 조건 등)가 대화 내에서 모두 제공되어 있는가?
  - 생략된 파라미터가 있다면 대화 이력이나 시스템 데이터에서 유일한 값으로 특정할 수 있는가?
  - 누락된 정보 없이 요청을 완결적으로 처리할 수 있는 상태인가?
  - 대화에서 요청을 처리하기 위한 모든 필수 정보가 명확하게 제공되었는가?
  - 필수 파라미터가 대화의 다른 부분에서 유추 가능한가?
  Referent Grounding:
  - 마지막 쿼리에서 사용된 지시 표현('그 사람', '그달', '그 상품' 등)이 대화 이력에서 식별 가능한 실체에 연결되는가?
  - 대화에서 한 번도 언급되지 않은 개체를 지시 표현으로 갑자기 참조하고 있지 않은가?
  - 시스템 데이터에 해당 참조 대상의 레코드가 존재하여 실제로 조회·처리가 가능한가?
  - 지시 표현이 대화의 맥락에서 혼동 없이 해석될 수 있는가?
  - 참조된 개체가 대화의 이전 부분에서 명확히 정의되었는가?
