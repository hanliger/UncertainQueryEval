definition: 대화 문맥이 마지막 쿼리의 의미를 해소하는 데 충분하고 일관적인 정도. 선행사 존재 여부, 턴 간 사실 정합성, 대화 초점의 수렴 정도, 문맥 내 값의 안정성을 평가한다.
sub_dimension:
  Antecedent Existence:
  - 마지막 쿼리에 등장하는 지시 표현('그것', '걔', '그 사람', '그달', '아까 그거' 등)의 선행사가 이전 대화 이력에 실제로 존재하는가?
  - 선행사 없이 갑자기 등장한 지시 표현이 있어 참조 대상을 특정할 수 없는 상황이 아닌가?
  - 이전 대화에서 한 번도 언급되지 않은 개체를 마지막 쿼리가 전제하고 있지 않은가?
  - 마지막 쿼리의 지시 표현이 이전 대화에서 명확히 정의된 개체를 참조하고 있는가?
  - 이전 대화에서 명시적으로 언급된 개체가 마지막 쿼리의 지시 표현과 일치하는가?
  Cross-turn Fact Consistency:
  - 이전 턴에서 확인된 사실(완료, 종료, 존재하지 않음 등)과 마지막 쿼리의 전제가 모순되지 않는가?
  - 사용자가 직전 턴에서 인지한 정보(기간, 금액, 상태 등)를 마지막 쿼리에서 다르게 인용하고 있지 않은가?
  - 시스템이 불가능하다고 안내한 사항을 사용자가 다시 요청하는 상황이 아닌가?
  - 이전 대화에서 제공된 정보가 마지막 쿼리에서 일관되게 사용되고 있는가?
  - 마지막 쿼리의 전제가 이전 대화에서 확인된 사실과 일치하는가?
  Referent Uniqueness in Context:
  - 마지막 쿼리의 지시 표현이 가리킬 수 있는 선행사가 대화 이력에서 하나뿐인가?
  - 복수의 대상이 동등하게 논의된 직후 지시 표현이 사용되어 어느 쪽인지 결정할 수 없는 상황이 아닌가?
  - 마지막 쿼리의 지시 표현이 대화 이력에서 명확히 하나의 개체를 가리키고 있는가?
  - 대화 중 논의된 개체들 중 하나만이 마지막 쿼리의 지시 표현과 일치하는가?
  Topic Convergence:
  - 대화에서 다뤄진 주제들이 마지막 쿼리 시점에 하나의 초점으로 수렴되어 있는가?
  - 여러 주제가 폭넓게 거론된 뒤 포괄적 지시가 사용되어 대화 초점이 흐려진 상태가 아닌가?
  - 마지막 쿼리 시점에 대화의 주제가 명확히 하나로 정리되어 있는가?
  - 대화의 흐름이 마지막 쿼리에서 하나의 주제로 자연스럽게 이어지고 있는가?
  Contextual Value Stability:
  - 대화 중 참조된 값(잔액, 한도, 납부 현황 등)이 대화 진행 중 외부 이벤트로 변동하여 마지막 쿼리 시점에 어떤 값을 의미하는지 불확실하지 않은가?
  - 대화 중 참조된 값이 외부 요인에 의해 변동되지 않아 마지막 쿼리 시점에 명확한가?
  - 대화 중 언급된 값이 마지막 쿼리 시점까지 일관되게 유지되고 있는가?
