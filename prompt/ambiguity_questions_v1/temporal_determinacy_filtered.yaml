definition: 대화 내에서 참조 대상이나 조건의 값이 시간 또는 외부 요인에 의해 변동하지 않고 안정적으로 확정되는 정도. 실시간 데이터 의존성, 시점 간 값 불일치 등을 평가한다.
sub_dimension:
  Temporal Stability:
  - 마지막 쿼리에서 참조하는 값(환율, 잔액, 한도 등)이 조회 시점과 무관하게 고정된 값인가?
  - '''지금'', ''현재'' 등 시점 의존 표현이 가리키는 값이 실행 시점에도 동일하게 유지되는가?'
  - 대화 중 언급된 날짜나 시간이 외부 요인에 의해 변동되지 않고 고정된 값으로 유지되는가?
  - 실시간 데이터에 의존하지 않고도 대화의 결과가 일관되게 유지되는가?
  - 마지막 쿼리에서 참조하는 환율이 특정 날짜나 시간에 고정된 값인가?
  - 잔액이 특정 시점의 거래 내역에 따라 변동하지 않고 고정된 값인가?
  - '''지금''이라는 표현이 사용된 경우, 그 시점이 명확하게 정의되어 있는가?'
  - 현재 시점에서의 한도가 외부 요인에 의해 변동되지 않고 고정된 값인가?
  Reference Anchoring:
  - 마지막 쿼리의 지시 대상이 외부 상태 변화와 무관하게 하나의 고정된 값을 가리키는가?
  - 이전 턴의 계산 결과나 조회 결과가 현재 시점에서도 유효한 값인가?
  - 대화 중 참조된 데이터가 외부 시스템의 상태 변화와 무관하게 일관성을 유지하는가?
  - 대화의 흐름에서 참조된 정보가 명확하게 정의되어 있어 혼동의 여지가 없는가?
  - 마지막 쿼리의 지시 대상이 특정 날짜나 시간에 고정된 값으로 명확히 정의되어 있는가?
  - 이전 턴의 계산 결과가 현재 시점에서도 동일한 조건 하에 유효한가?
  - 조회 결과가 외부 데이터의 변동에 영향을 받지 않고 고정된 값으로 유지되는가?
