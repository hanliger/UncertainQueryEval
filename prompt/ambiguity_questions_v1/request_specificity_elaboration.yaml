definition: 사용자의 요청이 단일 작업으로 실행할 수 있을 만큼 구체적인 정도. 추상적 동사, 상위 분류명, 포괄적 범위 지정 등으로 인해 실행 대상이 좁혀지지 않는 경우를 평가한다.
sub_dimension:
  Action Specificity:
  - 마지막 쿼리에서 사용된 동사가 구체적인 단일 행위를 지칭하는가?
  - '''처리해줘'', ''정리해줘'' 등 추상적 표현 없이 명확한 행위가 지정되어 있는가?'
  - 마지막 쿼리에서 사용된 동사가 특정한 금융 거래를 지칭하는가?
  - 마지막 쿼리에서 사용된 동사가 특정한 데이터 분석 작업을 지칭하는가?
  - 마지막 쿼리에서 사용된 동사가 특정한 보고서 생성을 지칭하는가?
  - 마지막 쿼리에서 사용된 동사가 특정한 계좌 이체를 지칭하는가?
  Scope Boundedness:
  - 요청의 범위가 하나의 작업으로 처리 가능한 수준으로 한정되어 있는가?
  - '''다'', ''전부'', ''관련된 거 모두'' 등 포괄적 범위 지정 없이 처리 대상이 특정되어 있는가?'
  - 상위 분류명 대신 구체적인 하위 항목(상품명, 서비스명 등)이 명시되어 있는가?
  - 요청의 범위가 특정한 금융 상품에 한정되어 있는가?
  - 요청의 범위가 특정한 시간 범위 내에서 처리 가능한가?
  - 요청의 범위가 특정한 고객 그룹에 한정되어 있는가?
  - 요청의 범위가 특정한 지역 내에서 처리 가능한가?
  - 요청의 범위가 특정한 거래 유형에 한정되어 있는가?
