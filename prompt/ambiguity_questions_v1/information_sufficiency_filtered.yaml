definition: 대화에서 요청을 수행하기 위해 필요한 핵심 정보가 빠짐없이 제공되어 있는 정도. 서술어, 파라미터, 조건 등 필수 요소의 결핍 여부를 평가한다.
sub_dimension:
  Predicate Presence:
  - 마지막 사용자 쿼리에 원하는 행위를 나타내는 서술어(동사)가 명시되어 있는가?
  - 서술어가 생략되었더라도 문맥에서 의도된 행위를 유일하게 복원할 수 있는가?
  - 마지막 사용자 쿼리에서 수행할 작업의 종류가 명확하게 드러나는가?
  - 문맥을 통해 서술어가 명확히 유추될 수 있는가?
  - 마지막 사용자 쿼리에 명시된 서술어가 대화의 맥락과 일치하는가?
  - 서술어가 명시된 경우, 그 서술어가 요청의 의도를 명확히 전달하는가?
  Parameter Availability:
  - 요청 수행에 필요한 필수 정보(대상, 금액, 조건 등)가 대화 내에서 모두 제공되어 있는가?
  - 생략된 파라미터가 있다면 대화 이력에서 유일한 값으로 특정할 수 있는가?
  - 누락된 정보 없이 요청을 완결적으로 처리할 수 있는 상태인가?
  - 대화에서 요청을 처리하기 위한 모든 필수 파라미터가 명확히 식별 가능한가?
  - 대화 내에서 필요한 모든 정보가 중복 없이 제공되고 있는가?
  - 요청을 처리하기 위한 모든 조건이 대화에서 명시되어 있는가?
  - 대화에서 요청의 대상이 명확하게 식별 가능한가?
  - 요청 수행에 필요한 금액이 대화 내에서 명시되어 있는가?
  - 조건이 필요한 경우, 그 조건이 대화에서 명확히 제공되고 있는가?
  - 대화에서 제공된 정보가 요청을 완결적으로 처리하기에 충분한가?
