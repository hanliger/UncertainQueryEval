definition: 사용자의 요청이 시스템의 지식 베이스(서비스 사양, 상품 정보, 사용자 데이터) 내에서 충돌 없이 처리 가능한 정도. 서비스 제약과의 정합성, 데이터 존재 여부를 평가한다.
sub_dimension:
  Service Feasibility:
  - 사용자의 요청이 시스템이 제공하는 서비스 범위 안에서 처리 가능한 것인가?
  - 요청된 기능이나 조건이 서비스의 실제 제약(한도, 지원 여부 등)과 충돌하지 않는가?
  - 사용자의 요청이 시스템의 현재 서비스 정책과 일치하는가?
  - 요청된 서비스가 시스템의 운영 시간 내에 제공 가능한가?
  - 사용자의 요청이 시스템의 서비스 카탈로그에 명시된 기능과 일치하는가?
  - 요청된 서비스가 현재 시스템에서 지원 중인 상태인가?
  - 사용자가 요청한 서비스가 시스템의 지역적 제한 사항과 충돌하지 않는가?
  Data Availability:
  - 요청 처리에 필요한 데이터(수신자 정보, 상품 정보, 계좌 정보 등)가 시스템에 존재하는가?
  - 사용자가 지칭하는 대상이 시스템 데이터에서 단일 레코드로 매핑되는가?
  - 시스템 데이터의 현재 상태(판매 종료, 계약 해지 등)와 사용자 요청의 전제가 일치하는가?
  - 요청된 정보가 시스템의 최신 데이터로부터 얻을 수 있는가?
  - 사용자가 제공한 정보가 시스템의 데이터베이스에서 정확히 일치하는 항목을 찾을 수 있는가?
  - 요청된 데이터를 시스템의 최신 데이터베이스에서 즉시 검색할 수 있는가?
  - 사용자가 제공한 정보가 시스템의 데이터베이스에서 중복 없이 유일한 항목으로 식별되는가?
  - 시스템의 데이터베이스에 사용자가 요청한 특정 상품의 최신 정보가 포함되어 있는가?
  - 사용자가 언급한 계좌 정보가 시스템의 데이터베이스에 정확히 기록되어 있는가?
  Query Specificity:
  - 사용자의 검색 조건이 시스템에서 단일 결과를 반환할 수 있을 만큼 구체적인가?
  - 사용자의 요청이 시스템의 검색 알고리즘에 의해 명확하게 해석될 수 있는가?
  - 사용자의 요청이 시스템의 데이터 구조와 일관되게 매핑될 수 있는가?
  - 사용자의 검색 조건이 시스템의 필터링 옵션과 정확히 일치하는가?
  - 사용자가 제공한 검색 조건이 시스템의 데이터베이스에서 중복 결과 없이 단일 항목을 반환할 수 있는가?
