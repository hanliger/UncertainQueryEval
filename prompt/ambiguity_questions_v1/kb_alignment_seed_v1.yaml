definition: 사용자의 요청이 시스템의 지식 베이스(서비스 사양, 상품 정보, 사용자 데이터) 내에서 충돌 없이 처리 가능한 정도. 서비스 제약과의 정합성, 데이터 존재 여부를 평가한다.
sub_dimension:
  Service Feasibility:
  - 사용자의 요청이 시스템이 제공하는 서비스 범위 안에서 처리 가능한 것인가?
  - 요청된 기능이나 조건이 서비스의 실제 제약(한도, 지원 여부 등)과 충돌하지 않는가?
  Data Availability:
  - 요청 처리에 필요한 데이터(수신자 정보, 상품 정보, 계좌 정보 등)가 시스템에 존재하는가?
  - 사용자가 지칭하는 대상이 시스템 데이터에서 단일 레코드로 매핑되는가?
  - 시스템 데이터의 현재 상태(판매 종료, 계약 해지 등)와 사용자 요청의 전제가 일치하는가?
  Query Specificity:
  - 사용자의 검색 조건이 시스템에서 단일 결과를 반환할 수 있을 만큼 구체적인가?
