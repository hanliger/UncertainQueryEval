# ============================================================
# Modality Dimensions
# ============================================================

information_sufficiency:  # Emptiness
  definition: 대화에서 요청을 수행하기 위해 필요한 핵심 정보가 빠짐없이 제공되어 있는 정도. 서술어, 파라미터, 조건 등 필수 요소의 결핍 여부를 평가한다.
  sub_dimension:
    Predicate Presence:
      마지막 사용자 쿼리에 원하는 행위를 나타내는 서술어(동사)가 명시되어 있는가?
      서술어가 생략되었더라도 문맥에서 의도된 행위를 유일하게 복원할 수 있는가?
    Parameter Availability:
      요청 수행에 필요한 필수 정보(대상, 금액, 조건 등)가 대화 내에서 모두 제공되어 있는가?
      생략된 파라미터가 있다면 대화 이력에서 유일한 값으로 특정할 수 있는가?
      누락된 정보 없이 요청을 완결적으로 처리할 수 있는 상태인가?

information_coherence:  # Clash
  definition: 대화 내에서 제공된 정보, 조건, 또는 전제들이 서로 충돌하지 않고 양립 가능한 정도. 사용자의 발화, 이전 문맥, 시스템 안내 간의 모순 여부를 평가한다.
  sub_dimension:
    Condition Consistency:
      마지막 사용자 쿼리에서 제시된 조건들이 서로 논리적으로 양립 가능한가?
      사용자가 동시에 요구하는 사항들이 서로 모순되지 않는가?
    Premise Compatibility:
      사용자의 요청이 시스템이 이전에 안내한 제약이나 상태와 충돌하지 않는가?
      이전 턴에서 확인된 사실(완료, 종료, 불가 등)과 현재 요청이 배치되지 않는가?
      대화 내에서 사용자가 수용한 조건을 이후 발화에서 부정하고 있지 않은가?

interpretation_singularity:  # Multiplicity
  definition: 마지막 사용자 쿼리의 해석이 하나로 수렴되는 정도. 지시 대상, 구문 구조, 또는 참조 표현이 복수의 해석 경로를 만들지 않는지를 평가한다.
  sub_dimension:
    Target Singularity:
      마지막 쿼리에서 지칭하는 대상(사람, 상품, 계좌 등)이 하나로 특정되는가?
      별명이나 지시 표현이 단일 개체만을 가리키는가?
    Structural Univocality:
      마지막 쿼리의 구문 구조가 단 하나의 파싱(해석 구조)만을 허용하는가?
      나열 표현에서 각 항목의 대응 관계가 명확히 결정되는가?
      중의적 수식 관계나 병렬 구조 없이 의미가 하나로 읽히는가?

request_specificity:  # Generality
  definition: 사용자의 요청이 단일 작업으로 실행할 수 있을 만큼 구체적인 정도. 추상적 동사, 상위 분류명, 포괄적 범위 지정 등으로 인해 실행 대상이 좁혀지지 않는 경우를 평가한다.
  sub_dimension:
    Action Specificity:
      마지막 쿼리에서 사용된 동사가 구체적인 단일 행위를 지칭하는가?
      '처리해줘', '정리해줘' 등 추상적 표현 없이 명확한 행위가 지정되어 있는가?
    Scope Boundedness:
      요청의 범위가 하나의 작업으로 처리 가능한 수준으로 한정되어 있는가?
      '다', '전부', '관련된 거 모두' 등 포괄적 범위 지정 없이 처리 대상이 특정되어 있는가?
      상위 분류명 대신 구체적인 하위 항목(상품명, 서비스명 등)이 명시되어 있는가?

temporal_determinacy:  # Fluidity
  definition: 대화 내에서 참조 대상이나 조건의 값이 시간 또는 외부 요인에 의해 변동하지 않고 안정적으로 확정되는 정도. 실시간 데이터 의존성, 시점 간 값 불일치 등을 평가한다.
  sub_dimension:
    Temporal Stability:
      마지막 쿼리에서 참조하는 값(환율, 잔액, 한도 등)이 조회 시점과 무관하게 고정된 값인가?
      '지금', '현재' 등 시점 의존 표현이 가리키는 값이 실행 시점에도 동일하게 유지되는가?
    Reference Anchoring:
      마지막 쿼리의 지시 대상이 외부 상태 변화와 무관하게 하나의 고정된 값을 가리키는가?
      대화 중 의도나 목적이 전환되었다면 그 전환이 명시적으로 선언되어 있는가?
      이전 턴의 계산 결과나 조회 결과가 현재 시점에서도 유효한 값인가?

# ============================================================
# Element Dimensions
# ============================================================

utterance_completeness:  # User Utterance
  definition: 마지막 사용자 발화 자체가 언어적으로 완결되고 명확한 정도. 문법적 완결성, 성분 생략, 중의적 표현, 논리적 자기모순 등 발화 수준의 모호성을 평가한다.
  sub_dimension:
    Syntactic Completeness:
      마지막 사용자 발화가 문법적으로 완결된 문장 형태를 갖추고 있는가?
      주어, 서술어, 목적어 등 핵심 문장 성분이 생략 없이 포함되어 있는가?
    Semantic Univocality:
      마지막 발화의 어휘와 표현이 단일한 의미로만 해석되는가?
      동음이의어, 다의어, 또는 중의적 구문이 포함되어 있지 않은가?
      발화만 단독으로 읽었을 때 의도가 명확히 파악되는가?
    Propositional Consistency:
      마지막 발화 내에서 제시된 조건이나 전제가 서로 논리적으로 양립 가능한가?

context_determinacy:  # Dialogue Context
  definition: 대화 문맥이 마지막 쿼리의 의미를 해소하는 데 충분하고 일관적인 정도. 턴 간 정보의 정합성, 선행사 존재 여부, 문맥의 결정력을 평가한다.
  sub_dimension:
    Cross-turn Consistency:
      이전 턴들에서 제공된 정보가 서로 일관되어 마지막 쿼리 해석에 혼선을 주지 않는가?
      대화 이력에서 동일 대상에 대해 상충하는 정보가 제공되지 않았는가?
    Contextual Sufficiency:
      마지막 쿼리에 등장하는 지시 표현('그 사람', '거기', '아까 그거')의 선행사가 대화 이력에 존재하는가?
      이전 턴의 정보만으로 마지막 쿼리의 생략된 요소를 유일하게 복원할 수 있는가?
      대화 문맥이 마지막 쿼리의 모호성을 해소할 수 있는 충분한 단서를 포함하고 있는가?
    Topic Convergence:
      대화에서 다뤄진 주제들이 마지막 쿼리 시점에 하나의 초점으로 수렴되어 있는가?

kb_alignment:  # Knowledge Base
  definition: 사용자의 요청이 시스템의 지식 베이스(서비스 사양, 상품 정보, 사용자 데이터) 내에서 충돌 없이 처리 가능한 정도. 서비스 제약과의 정합성, 데이터 존재 여부를 평가한다.
  sub_dimension:
    Service Feasibility:
      사용자의 요청이 시스템이 제공하는 서비스 범위 안에서 처리 가능한 것인가?
      요청된 기능이나 조건이 서비스의 실제 제약(한도, 지원 여부 등)과 충돌하지 않는가?
    Data Availability:
      요청 처리에 필요한 데이터(수신자 정보, 상품 정보, 계좌 정보 등)가 시스템에 존재하는가?
      사용자가 지칭하는 대상이 시스템 데이터에서 단일 레코드로 매핑되는가?
      시스템 데이터의 현재 상태(판매 종료, 계약 해지 등)와 사용자 요청의 전제가 일치하는가?
    Query Specificity:
      사용자의 검색 조건이 시스템에서 단일 결과를 반환할 수 있을 만큼 구체적인가?
