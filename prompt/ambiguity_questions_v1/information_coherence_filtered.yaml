definition: 대화 내에서 제공된 정보, 조건, 또는 전제들이 서로 충돌하지 않고 양립 가능한 정도. 사용자의 발화, 이전 문맥, 시스템 안내 간의 모순 여부를 평가한다.
sub_dimension:
  Condition Consistency:
  - 마지막 사용자 쿼리에서 제시된 조건들이 서로 논리적으로 양립 가능한가?
  - 사용자가 동시에 요구하는 사항들이 서로 모순되지 않는가?
  - 사용자가 제시한 조건들이 서로 일관성을 유지하고 있는가?
  - 사용자의 요구 사항들이 서로 충돌 없이 조화를 이루고 있는가?
  - 마지막 사용자 쿼리에서 제시된 조건들이 시간적 순서에 따라 논리적으로 양립 가능한가?
  - 사용자가 요구한 두 가지 조건이 서로의 충족을 방해하지 않는가?
  - 사용자가 제시한 조건들이 동일한 상황에서 모두 충족될 수 있는가?
  Premise Compatibility:
  - 사용자의 요청이 시스템이 이전에 안내한 제약이나 상태와 충돌하지 않는가?
  - 이전 턴에서 확인된 사실(완료, 종료, 불가 등)과 현재 요청이 배치되지 않는가?
  - 대화 내에서 사용자가 수용한 조건을 이후 발화에서 부정하고 있지 않은가?
  - 현재 요청이 이전에 제공된 정보나 지침과 일치하는가?
  - 사용자가 이전에 동의한 조건과 현재 요청이 모순되지 않는가?
  - 사용자의 요청이 시스템이 이전에 안내한 특정 시간적 제약과 충돌하지 않는가?
  - 이전 턴에서 시스템이 제공한 정보와 현재 사용자의 요청이 동일한 사실을 기반으로 하고 있는가?
  - 대화 내에서 사용자가 수용한 특정 조건을 이후 발화에서 명시적으로 부정하고 있지 않은가?
  - 이전 턴에서 시스템이 안내한 불가 사항과 현재 사용자의 요청이 상충되지 않는가?
